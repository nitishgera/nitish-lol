<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nitish.lol</title>
  <meta name="description" content="trying to build nice things." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1 class="site-name">nitish.lol</h1>
    <p class="tagline">trying to build nice things. lol.</p>
  </header>

  <main class="grid">

    <a href="https://tinytrips.nitish.lol" class="card">
      <div class="card-visual" style="background: #fdf3e7;">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Suitcase body -->
          <rect x="12" y="26" width="48" height="36" rx="6" fill="#e8c99a" />
          <rect x="12" y="26" width="48" height="36" rx="6" stroke="#c9a06a" stroke-width="2"/>
          <!-- Suitcase handle -->
          <path d="M26 26V20a10 10 0 0 1 20 0v6" stroke="#c9a06a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <!-- Latch -->
          <rect x="31" y="40" width="10" height="7" rx="2" fill="#c9a06a"/>
          <!-- Wheels -->
          <circle cx="22" cy="63" r="3" fill="#c9a06a"/>
          <circle cx="50" cy="63" r="3" fill="#c9a06a"/>
          <!-- Stripe -->
          <line x1="12" y1="44" x2="60" y2="44" stroke="#c9a06a" stroke-width="1.5"/>
          <!-- Baby face -->
          <circle cx="54" cy="20" r="10" fill="#fce8c8" stroke="#c9a06a" stroke-width="1.5"/>
          <circle cx="51" cy="18" r="1.2" fill="#7a5230"/>
          <circle cx="57" cy="18" r="1.2" fill="#7a5230"/>
          <path d="M52 22 Q54 24 56 22" stroke="#7a5230" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="card-body">
        <h2 class="card-title">tiny trips</h2>
        <p class="card-desc">A travel planning app for parents of toddlers.</p>
        <span class="card-link">Explore →</span>
      </div>
    </a>

    <div class="card card--ghost">
      <div class="card-visual card-visual--ghost">
        <span class="ghost-dots">· · ·</span>
      </div>
      <div class="card-body">
        <h2 class="card-title card-title--ghost">more apps incoming</h2>
        <p class="card-desc card-desc--ghost">working on something new.</p>
      </div>
    </div>

  </main>

  <footer>
    <p>Made by Nitish Gera in Singapore</p>
    <a href="mailto:nitishgera@gmail.com" class="feedback-link" aria-label="Send feedback">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
      Send feedback
    </a>
  </footer>

</body>
</html>
